 NNN}, E = {ANN, NAN, NNA, NNN}"],correcta:0,retroalimentacion:"Para tres sacos independientes con dos opciones cada uno, hay 2\xB3 = 8 resultados posibles que forman el espacio muestral S. El suceso E ('al menos dos sacos de calidad Alta') agrupa los resultados que tienen dos o tres 'A': {AAA, AAN, ANA, NAA}."},{id:3,municipio:"Valle del Sibundoy",tema:"Artesan\xEDas Kam\xEBnts\xE1",contexto:"En un taller de artesan\xEDas en Sibundoy, una maestra ind\xEDgena selecciona al azar una m\xE1scara tallada en madera de sauce. En la mesa tiene m\xE1scaras de la Alegr\xEDa (A), del Dolor (D) y de la Sabidur\xEDa (S).",pregunta:"Si la maestra toma una m\xE1scara al azar para pulirla, \xBFcu\xE1l es el espacio muestral (S) de los dise\xF1os disponibles y el suceso (E) de seleccionar una m\xE1scara que no represente el Dolor?",opciones:["S = {A, D, S}, E = {A, S}","S = {A, D, S}, E = {D}","S = {Alegr\xEDa, Sabidur\xEDa}, E = {Alegr\xEDa}","S = {A, D, S, M}, E = {A, D, S}"],correcta:0,retroalimentacion:"Los resultados posibles (tipos de dise\xF1o de m\xE1scara) son {A, D, S}, formando el espacio muestral S. El suceso 'no representar el Dolor' excluye el elemento D, por lo que E = {A, S}."},{id:4,municipio:"Puerto As\xEDs",tema:"Navegaci\xF3n en el R\xEDo Putumayo",contexto:"Un estudiante de Grado 10\xB0 observa las embarcaciones que llegan al muelle de Puerto As\xEDs desde el r\xEDo Putumayo. En un intervalo de tiempo, registra si las pr\xF3ximas dos embarcaciones son Lanchas Motoras (L) o Canoas Tradicionales (C).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de las dos embarcaciones observadas y el suceso (E) de que pase exactamente una lancha motora?",opciones:["S = {LL, LC, CL, CC}, E = {LC, CL}","S = {LL, CC}, E = {LC}","S = {L, C}, E = {L}","S = {LL, LC, CL, CC}, E = {LL, CC}"],correcta:0,retroalimentacion:"Al registrar dos embarcaciones consecutivas, se obtienen 4 combinaciones ordenadas en el espacio muestral S. El suceso de que pase exactamente una lancha corresponde a las combinaciones {LC, CL}."},{id:5,municipio:"Puerto Legu\xEDzamo",tema:"Tortugas Charapa",contexto:"En el Parque Nacional Natural La Paya en Puerto Legu\xEDzamo, un guardabosques monitorea un nido de tortugas Charapa. Al nacer, clasifica el tama\xF1o del caparaz\xF3n de una tortuga reci\xE9n nacida seleccionada al azar como Peque\xF1o (P), Mediano (M) o Grande (G).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de la clasificaci\xF3n del tama\xF1o y el suceso (E) de que la tortuga sea de tama\xF1o Mediano o Grande?",opciones:["S = {P, M, G}, E = {M, G}","S = {P, M, G}, E = {P, M}","S = {P, M, G}, E = {M}","S = {Charapa}, E = {Grande}"],correcta:0,retroalimentacion:"Los tres posibles tama\xF1os forman el espacio muestral completo S = {P, M, G}. El suceso de que el tama\xF1o sea Mediano o Grande est\xE1 dado por el subconjunto E = {M, G}."},{id:6,municipio:"Villagarz\xF3n",tema:"Avistamiento de Aves en Chaluayaco",contexto:"Un grupo de j\xF3venes investigadores en la Reserva Chaluayaco de Villagarz\xF3n busca identificar aves end\xE9micas. Clasifican el siguiente ejemplar observado seg\xFAn su color predominante: Verde (V), Azul (A), o Rojo (R).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de la observaci\xF3n y el suceso (E) de que el ave observada no sea de color Rojo?",opciones:["S = {V, A, R}, E = {V, A}","S = {V, A, R}, E = {R}","S = {V, A}, E = {V, A, R}","S = {Verde, Azul}, E = {Verde}"],correcta:0,retroalimentacion:"Los tres colores posibles forman el espacio muestral S = {V, A, R}. El suceso de que 'no sea de color Rojo' excluye la opci\xF3n R, resultando en el conjunto E = {V, A}."},{id:7,municipio:"Valle del Guamuez",tema:"Cosecha de Chontaduro",contexto:"En una parcela del Valle del Guamuez, un agricultor selecciona dos chontaduros de un racimo reci\xE9n cosechado y califica su madurez como Pint\xF3n (P) o Maduro (M).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de los dos chontaduros evaluados y el suceso (E) de que al menos uno de ellos est\xE9 Maduro (M)?",opciones:["S = {PP, PM, MP, MM}, E = {PM, MP, MM}","S = {PP, PM, MP, MM}, E = {MM}","S = {P, M}, E = {M}","S = {PP, MM}, E = {PM, MP}"],correcta:0,retroalimentacion:"El espacio muestral de dos chontaduros consta de 4 elementos S = {PP, PM, MP, MM}. El suceso 'al menos uno maduro' significa que puede haber uno o ambos maduros, dando E = {PM, MP, MM}."},{id:8,municipio:"Mocoa",tema:"Plantas de la Chagra Ind\xEDgena",contexto:"En una chagra tradicional Kam\xEBnts\xE1 en Mocoa, un taita curandero recolecta dos plantas medicinales sagradas de entre tres especies disponibles: Llant\xE9n (L), Ortiga (O) y Cuti (C). Las recolecta una a una en orden y sin repetici\xF3n.",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de las parejas ordenadas de plantas recolectadas y el suceso (E) de que la primera planta recolectada sea Ortiga (O)?",opciones:["S = {LO, LC, OL, OC, CL, CO}, E = {OL, OC}","S = {LO, LC, OC}, E = {OL}","S = {L, O, C}, E = {O}","S = {LO, LC, OL, OC, CL, CO}, E = {LO, CO}"],correcta:0,retroalimentacion:"Al extraer dos plantas diferentes en orden, hay 6 parejas ordenadas posibles que forman S. Las parejas que comienzan por Ortiga (O) son {OL, OC}, lo cual define el suceso E."},{id:9,municipio:"Puerto Guzm\xE1n",tema:"Pesca en el R\xEDo Caquet\xE1",contexto:"Un pescador artesanal de Puerto Guzm\xE1n extrae un pez de su red en el caudaloso r\xEDo Caquet\xE1. El pez puede pertenecer a una de tres especies de gran aprecio comercial: Pintadillo (P), Bocachico (B) o Sabaleta (S).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de la especie del pez capturado y el suceso (E) de que el pez sea un Bocachico o un Pintadillo?",opciones:["S = {P, B, S}, E = {P, B}","S = {P, B, S}, E = {S}","S = {P, B}, E = {P, B, S}","S = {Pintadillo, Bocachico}, E = {Pintadillo}"],correcta:0,retroalimentacion:"Las tres especies posibles que pueden salir en la pesca constituyen el espacio muestral completo S = {P, B, S}. El suceso de que sea Bocachico (B) o Pintadillo (P) es el subconjunto E = {P, B}."},{id:10,municipio:"Santiago",tema:"Aguas Termales de Col\xF3n",contexto:"Se monitorea la temperatura de las piscinas de aguas termales en Col\xF3n (Santiago). Se registra si en dos d\xEDas seguidos la temperatura del agua supera los 38\xB0C, anotando S\xED (S) o No (N).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de los dos d\xEDas registrados y el suceso (E) de que no se superen los 38\xB0C en ninguno de los dos d\xEDas?",opciones:["S = {SS, SN, NS, NN}, E = {NN}","S = {SS, SN, NS, NN}, E = {SS}","S = {S, N}, E = {N}","S = {SS, NN}, E = {SN, NS}"],correcta:0,retroalimentacion:"Con dos d\xEDas de medici\xF3n, el espacio de resultados posibles tiene 4 elementos. Que no se superen los 38\xB0C en ninguno de los dos d\xEDas se reduce al \xFAnico caso donde ambos d\xEDas son negativos: E = {NN}."},{id:11,municipio:"San Francisco",tema:"Floraci\xF3n de Orqu\xEDdeas",contexto:"En un vivero de conservaci\xF3n forestal en San Francisco, se eval\xFAan tres capullos de orqu\xEDdeas ex\xF3ticas para ver si florecen en la semana: S\xED (S) o No (N).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) y el suceso (E) de que florezcan exactamente dos de las tres orqu\xEDdeas?",opciones:["S = {SSS, SSN, SNS, SNN, NSS, NSN, NNS, NNN}, E = {SSN, SNS, NSS}","S = {SSS, SSN, SNS, SNN, NSS, NSN, NNS, NNN}, E = {SNN, NSN, NNS}","S = {SS, SN, NS, NN}, E = {SN, NS}","S = {SSS, NNN}, E = {SSN, SNS}"],correcta:0,retroalimentacion:"Al evaluar tres capullos hay 2\xB3 = 8 resultados posibles en S. El suceso de que florezcan exactamente dos requiere combinaciones con dos letras 'S' y una 'N': {SSN, SNS, NSS}."},{id:12,municipio:"Orito",tema:"C\xE1maras Trampa en Ingi-And\xE9",contexto:"En un sendero ecol\xF3gico de la Reserva Nacional Ingi-And\xE9 de Orito, se instala una c\xE1mara trampa. Se registra si el pr\xF3ximo mam\xEDfero mediano fotografiado es un Armadillo (A), un Cusumbo (C) o una Guagua (G).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) del mam\xEDfero registrado y el suceso (E) de que la c\xE1mara capte un Armadillo o una Guagua?",opciones:["S = {A, C, G}, E = {A, G}","S = {A, C, G}, E = {C}","S = {Armadillo, Guagua}, E = {Armadillo}","S = {A, C, G}, E = {A, C, G}"],correcta:0,retroalimentacion:"Las tres especies constituyen el espacio muestral S = {A, C, G}. El suceso de captar Armadillo o Guagua se representa mediante el subconjunto E = {A, G}."},{id:13,municipio:"Puerto Caicedo",tema:"Calidad de Cacao Org\xE1nico",contexto:"Una asociaci\xF3n de cacaoteros en Puerto Caicedo clasifica sus barras de chocolate artesanal seg\xFAn su porcentaje de cacao en tres categor\xEDas exclusivas: Suave (S), Semiamargo (M) y Amargo (A).",pregunta:"Si un catador toma una barra de chocolate al azar, \xBFcu\xE1l es el espacio muestral (S) y el suceso (E) de que el chocolate elegido sea Amargo o Semiamargo?",opciones:["S = {S, M, A}, E = {M, A}","S = {S, M, A}, E = {S, M}","S = {M, A}, E = {A}","S = {Suave, Amargo}, E = {Amargo}"],correcta:0,retroalimentacion:"El espacio muestral agrupa las tres categor\xEDas posibles de sabor S = {S, M, A}. El suceso de que sea Amargo (A) o Semiamargo (M) corresponde al subconjunto E = {M, A}."},{id:14,municipio:"San Miguel",tema:"Monitoreo Ambiental de R\xEDos",contexto:"En el municipio fronterizo de San Miguel, ingenieros ambientales toman una muestra de agua del r\xEDo San Miguel para evaluar su nivel de turbidez, clasific\xE1ndolo en Bajo (B), Medio (M) o Alto (A).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) del an\xE1lisis de turbidez y el suceso (E) de que la turbidez sea de nivel Bajo o Medio?",opciones:["S = {B, M, A}, E = {B, M}","S = {B, M, A}, E = {A}","S = {B, M}, E = {B, M, A}","S = {Bajo, Medio}, E = {Bajo}"],correcta:0,retroalimentacion:"Los tres estados de turbidez posibles forman el espacio muestral S = {B, M, A}. El suceso de que la turbidez est\xE9 dentro del rango aceptable (Bajo o Medio) es E = {B, M}."},{id:15,municipio:"Mocoa",tema:"Corrientes en el R\xEDo Rumiyaco",contexto:"Un estudiante en las playas del r\xEDo Rumiyaco en Mocoa lanza un flotador biodegradable al r\xEDo y observa si este es arrastrado por la corriente hacia la Orilla Izquierda (I), la Orilla Derecha (D) o si sigue recto por el Centro (C).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de la trayectoria y el suceso (E) de que el flotador no termine en la Orilla Derecha?",opciones:["S = {I, D, C}, E = {I, C}","S = {I, D, C}, E = {D}","S = {I, C}, E = {I, D, C}","S = {Izquierda, Centro}, E = {Izquierda}"],correcta:0,retroalimentacion:"Los posibles caminos del flotador son {I, D, C}. Al excluir la Orilla Derecha (D), el suceso de inter\xE9s queda definido por las trayectorias restantes: E = {I, C}."},{id:16,municipio:"Valle del Sibundoy",tema:"Instrumentos del Carnaval Kam\xEBnts\xE1",contexto:"Un joven m\xFAsico de Sibundoy tiene tres instrumentos sagrados hechos a mano: un Tambor (T), una Flauta (F) y un Capador (C). Elige dos instrumentos al azar para participar en la comparsa del Clatsh (sin repetici\xF3n y sin importar el orden).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de las combinaciones de instrumentos elegidos y el suceso (E) de que la Flauta (F) sea uno de los instrumentos seleccionados?",opciones:["S = {TF, TC, FC}, E = {TF, FC}","S = {T, F, C}, E = {F}","S = {TF, TC, FC}, E = {TC}","S = {TF, TC, FC}, E = {TF, TC, FC}"],correcta:0,retroalimentacion:"Al seleccionar 2 elementos de un grupo de 3 sin orden, las combinaciones posibles son {TF, TC, FC}. El suceso en el que participa la flauta est\xE1 constituido por las parejas E = {TF, FC}."},{id:17,municipio:"Puerto As\xEDs",tema:"Avistamiento de Delfines Rosados",contexto:"Durante un paseo en lancha por el r\xEDo Putumayo saliendo de Puerto As\xEDs, un fot\xF3grafo realiza dos paradas de observaci\xF3n. En cada parada, registra si logra fotografiar al hermoso Delf\xEDn Rosado de r\xEDo: S\xED (S) o No (N).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de las dos observaciones y el suceso (E) de que logre fotografiar al delf\xEDn en al menos una de las paradas?",opciones:["S = {SS, SN, NS, NN}, E = {SS, SN, NS}","S = {SS, SN, NS, NN}, E = {SS}","S = {S, N}, E = {S}","S = {SS, NN}, E = {SN, NS}"],correcta:0,retroalimentacion:"Las cuatro combinaciones posibles de dos avistamientos independientes componen S. El suceso 'al menos una de las paradas' implica tener 1 o 2 respuestas afirmativas, es decir, E = {SS, SN, NS}."},{id:18,municipio:"Orito",tema:"Cosecha de Asa\xED Silvestre",contexto:"Una cooperativa de familias recolectoras en Orito selecciona dos racimos de asa\xED silvestre en la selva para procesar pulpa. Mide su grado de madurez como Verde (V) o Maduro (M).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de las dos muestras de asa\xED y el suceso (E) de que ambos racimos est\xE9n maduros?",opciones:["S = {VV, VM, MV, MM}, E = {MM}","S = {VV, VM, MV, MM}, E = {VM, MV, MM}","S = {V, M}, E = {M}","S = {VV, MM}, E = {VM, MV}"],correcta:0,retroalimentacion:"Al evaluar dos racimos independientes, el espacio muestral S tiene 4 elementos. El suceso de que ambos est\xE9n maduros corresponde al caso \xFAnico en el que ambos son 'M': E = {MM}."},{id:19,municipio:"Villagarz\xF3n",tema:"Frutales de Copoaz\xFA",contexto:"Un t\xE9cnico agr\xEDcola en Villagarz\xF3n eval\xFAa dos \xE1rboles de Copoaz\xFA de un cultivo piloto para verificar si presentan resistencia a plagas comunes de la regi\xF3n, anotando Resistente (R) o Susceptible (S).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de los dos \xE1rboles evaluados y el suceso (E) de que exactamente uno de los dos \xE1rboles sea Resistente (R)?",opciones:["S = {RR, RS, SR, SS}, E = {RS, SR}","S = {RR, SS}, E = {RS}","S = {R, S}, E = {R}","S = {RR, RS, SR, SS}, E = {RR, SS}"],correcta:0,retroalimentacion:"Las combinaciones de resistencia para dos \xE1rboles son 4. El suceso 'exactamente uno resistente' excluye que ambos lo sean o que ninguno lo sea, lo que nos deja con E = {RS, SR}."},{id:20,municipio:"Puerto Guzm\xE1n",tema:"Semillero de Oradores Escolares",contexto:"Un docente de una escuela rural de Puerto Guzm\xE1n selecciona dos estudiantes en orden para exponer sobre mitos de la selva. Registra si cada estudiante seleccionado es Masculino (M) o Femenino (F).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de los g\xE9neros de los dos expositores y el suceso (E) de que el primer expositor seleccionado sea de g\xE9nero Femenino (F)?",opciones:["S = {MM, MF, FM, FF}, E = {FM, FF}","S = {MM, FF}, E = {FM}","S = {M, F}, E = {F}","S = {MM, MF, FM, FF}, E = {MF, FM}"],correcta:0,retroalimentacion:"El espacio muestral de g\xE9neros ordenados para dos personas es S = {MM, MF, FM, FF}. El suceso de que la primera persona sea mujer requiere que la primera letra sea 'F', resultando E = {FM, FF}."},{id:21,municipio:"Santiago",tema:"Senderos Ecol\xF3gicos",contexto:"Un operador tur\xEDstico en Santiago clasifica la dificultad de tres caminos prehisp\xE1nicos locales como F\xE1cil (F), Moderada (M) o Dif\xEDcil (D). Elige un camino al azar para un grupo escolar.",pregunta:"\xBFCu\xE1l es el espacio muestral (S) y el suceso (E) de que el sendero elegido sea de dificultad Moderada o F\xE1cil?",opciones:["S = {F, M, D}, E = {F, M}","S = {F, M, D}, E = {M, D}","S = {F, M}, E = {F, M, D}","S = {F\xE1cil, Moderada}, E = {F\xE1cil}"],correcta:0,retroalimentacion:"El espacio de dificultad tiene tres posibles estados {F, M, D}. El suceso de que sea Moderada o F\xE1cil corresponde al subconjunto E = {F, M}."},{id:22,municipio:"San Francisco",tema:"Tejido de Fajas Tradicionales",contexto:"Una artesana en San Francisco teje una faja tradicional utilizando hilos de colores naturales de la Amazon\xEDa. Selecciona al azar dos colores de su cesta que contiene hilos de color Negro (N), Blanco (B) y Rojo (R) (sin repetici\xF3n y sin importar el orden).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de las combinaciones de colores elegidos y el suceso (E) de que el color Rojo (R) sea seleccionado?",opciones:["S = {NB, NR, BR}, E = {NR, BR}","S = {N, B, R}, E = {R}","S = {NB, NR, BR}, E = {NB}","S = {NB, NR, BR}, E = {NB, NR, BR}"],correcta:0,retroalimentacion:"Al seleccionar 2 colores entre 3 sin importar el orden y sin repetir, se obtienen 3 combinaciones. El suceso en el cual participa el color Rojo est\xE1 compuesto por las parejas E = {NR, BR}."},{id:23,municipio:"Puerto Caicedo",tema:"Avistamiento del Oso de Anteojos",contexto:"En un proyecto de monitoreo ambiental en las monta\xF1as de Puerto Caicedo, bi\xF3logos registran si logran avistar al Oso de Anteojos andino durante dos d\xEDas seguidos: Avistado (A) o No Avistado (N).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de las observaciones de los dos d\xEDas y el suceso (E) de que se observe al oso en al menos uno de los d\xEDas?",opciones:["S = {AA, AN, NA, NN}, E = {AA, AN, NA}","S = {AA, AN, NA, NN}, E = {AA}","S = {A, N}, E = {A}","S = {AA, NN}, E = {AN, NA}"],correcta:0,retroalimentacion:"Con dos d\xEDas de observaci\xF3n hay 4 combinaciones posibles. El suceso de observar al oso al menos un d\xEDa abarca los casos con 1 o 2 avistamientos: E = {AA, AN, NA}."},{id:24,municipio:"Valle del Guamuez",tema:"Feria del Chontaduro Gigante",contexto:"En una exposici\xF3n agr\xEDcola en la Hormiga (Valle del Guamuez), un jurado experto eval\xFAa la calidad y tama\xF1o de un chontaduro excepcional presentado a concurso, clasific\xE1ndolo como Mediano (M), Grande (G) o Extra Grande (X).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de la clasificaci\xF3n del jurado y el suceso (E) de que reciba una calificaci\xF3n superior a Mediano?",opciones:["S = {M, G, X}, E = {G, X}","S = {M, G, X}, E = {M}","S = {G, X}, E = {M, G, X}","S = {Grande, Extra}, E = {Grande}"],correcta:0,retroalimentacion:"La escala de evaluaci\xF3n contiene tres categor\xEDas, por tanto S = {M, G, X}. El suceso de que reciba una calificaci\xF3n superior a Mediano agrupa a Grande (G) y Extra Grande (X), dando E = {G, X}."},{id:25,municipio:"San Miguel",tema:"Acidez de Suelo para Cacao",contexto:"Ingenieros agr\xF3nomos en el municipio fronterizo de San Miguel analizan el suelo de dos parcelas de cacao para clasificar la acidez del terreno como \xC1cido (A) o Neutro (N).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de las dos parcelas evaluadas y el suceso (E) de que ninguna de las parcelas tenga un suelo de tipo \xC1cido (A)?",opciones:["S = {AA, AN, NA, NN}, E = {NN}","S = {AA, AN, NA, NN}, E = {AA}","S = {A, N}, E = {N}","S = {AA, NN}, E = {AN, NA}"],correcta:0,retroalimentacion:"El an\xE1lisis de dos parcelas nos da 4 combinaciones de resultados. Que ninguna tenga suelo \xC1cido significa que ambas son Neutras, definiendo el suceso E = {NN}."},{id:26,municipio:"Mocoa",tema:"Orqu\xEDdeas de la Reserva Suruma",contexto:"En la Reserva Suruma de Mocoa, un gu\xEDa ambientalista muestra una orqu\xEDdea silvestre a unos estudiantes y les pide identificar si es terrestre (T), ep\xEDfita (E) o lit\xF3fita (L).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de la clasificaci\xF3n de la orqu\xEDdea y el suceso (E) de que la planta sea ep\xEDfita o terrestre?",opciones:["S = {T, E, L}, E = {T, E}","S = {T, E, L}, E = {L}","S = {T, E}, E = {T, E, L}","S = {Ep\xEDfita, Terrestre}, E = {Ep\xEDfita}"],correcta:0,retroalimentacion:"Las tres clasificaciones forman el espacio muestral S = {T, E, L}. El suceso de que sea ep\xEDfita o terrestre est\xE1 dado por el conjunto E = {T, E}."},{id:27,municipio:"Puerto As\xEDs",tema:"Exportaci\xF3n de Palmitos",contexto:"Un analista de aduanas de Puerto As\xEDs monitorea dos cargamentos de palmitos amaz\xF3nicos y clasifica el mercado de destino de cada uno como Nacional (N) o Internacional (I).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de los mercados de destino de ambos cargamentos y el suceso (E) de que al menos uno de ellos tenga destino Internacional (I)?",opciones:["S = {NN, NI, IN, II}, E = {NI, IN, II}","S = {NN, NI, IN, II}, E = {II}","S = {N, I}, E = {I}","S = {NN, II}, E = {NI, IN}"],correcta:0,retroalimentacion:"La clasificaci\xF3n de destinos para dos cargamentos genera 4 posibilidades. El suceso 'al menos uno de destino internacional' incluye los resultados con uno o dos destinos internacionales, por lo que E = {NI, IN, II}."},{id:28,municipio:"Orito",tema:"Polinizaci\xF3n de Mariposas Morpho",contexto:"En un mariposario de Orito, un bi\xF3logo observa el vuelo de dos espectaculares mariposas morpho azules y registra si se posan en flores de orqu\xEDdeas (O) o de heliconias (H).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de los posaderos elegidos por las dos mariposas y el suceso (E) de que ambas elijan posarse sobre orqu\xEDdeas (O)?",opciones:["S = {OO, OH, HO, HH}, E = {OO}","S = {OO, OH, HO, HH}, E = {OH, HO, HH}","S = {O, H}, E = {O}","S = {OO, HH}, E = {OH, HO}"],correcta:0,retroalimentacion:"Las combinaciones de posaderos de dos mariposas son 4. El suceso de que ambas seleccionen orqu\xEDdeas se reduce al \xFAnico elemento donde ambas eligen orqu\xEDdea: E = {OO}."},{id:29,municipio:"Puerto Guzm\xE1n",tema:"Producci\xF3n de Pl\xE1tano Hart\xF3n",contexto:"Un agricultor de Puerto Guzm\xE1n inspecciona la sanidad de dos racimos de pl\xE1tano reci\xE9n recolectados de su plantaci\xF3n familiar, clasificando cada racimo como Aceptable (A) o Defectuoso (D) por manchas de insectos.",pregunta:"\xBFCu\xE1l es el espacio muestral (S) de los dos racimos evaluados y el suceso (E) de que exactamente uno de ellos sea Aceptable (A)?",opciones:["S = {AA, AD, DA, DD}, E = {AD, DA}","S = {AA, DD}, E = {AD}","S = {A, D}, E = {A}","S = {AA, AD, DA, DD}, E = {AA, DD}"],correcta:0,retroalimentacion:"La combinaci\xF3n de estados para dos racimos de pl\xE1tano da 4 resultados posibles. El suceso 'exactamente un racimo aceptable' corresponds a las parejas mixtas: E = {AD, DA}."},{id:30,municipio:"Valle del Sibundoy",tema:"Pintura Tradicional",contexto:"En Sibundoy, un joven de la comunidad Kam\xEBnts\xE1 selecciona al azar una pintura de origen natural para colorear un cuadro de la chagra de su abuelo. Su paleta tiene colores Amarillo (A), Verde (V) o Negro (N).",pregunta:"\xBFCu\xE1l es el espacio muestral (S) del color seleccionado y el suceso (E) de que el color elegido no sea Negro (N)?",opciones:["S = {A, V, N}, E = {A, V}","S = {A, V, N}, E = {N}","S = {A, V}, E = {A, V, N}","S = {Amarillo, Verde}, E = {Amarillo}"],correcta:0,retroalimentacion:"El espacio muestral agrupa los tres colores disponibles S = {A, V, N}. El suceso de que no se elija el color Negro corresponde a las opciones restantes, resultando en E = {A, V}."}];var id=[{id:101,municipio:"Mocoa",tema:"Senderismo en la Cascada Hornoyaco",contexto:"Un turista en Mocoa decide visitar la Cascada Hornoyaco. En el trayecto puede encontrar clima Lluvioso (LL), Nublado (N) o Despejado (D). Se registra el clima observado en dos tramos consecutivos del camino.",pregunta:"\xBFCu\xE1l es el espacio muestral S de los climas en los dos tramos y el suceso E de que el clima est\xE9 despejado en al menos uno de los tramos?",opciones:["S = {LLLL, LLN, LLD, NLL, NN, ND, DLL, DN, DD}, E = {LLD, ND, DLL, DN, DD}","S = {LL-LL, LL-N, LL-D, N-LL, N-N, N-D, D-LL, D-N, D-D}, E = {LL-D, N-D, D-LL, D-N, D-D}","S = {LL, LN, LD, NL, NN, ND, DL, DN, DD}, E = {LD, ND, DL, DN, DD}","S = {Lluvia, Despejado}, E = {Despejado}"],correcta:2,retroalimentacion:"Al registrar el clima en dos tramos con 3 estados posibles cada uno, el espacio muestral S contiene 3\xB2 = 9 resultados posibles (LL, LN, LD, NL, NN, ND, DL, DN, DD). El suceso de que est\xE9 despejado (D) en al menos un tramo agrupa todos los pares que contienen la letra 'D', es decir: {LD, ND, DL, DN, DD}."},{id:102,municipio:"Orito",tema:"Extracci\xF3n de Aceite de Sacha Inchi",contexto:"En una planta procesadora de Orito, se analiza la pureza de dos lotes de aceite de Sacha Inchi. Cada lote puede catalogarse como Extra Virgen (E), Virgen (V) o Corriente (C).",pregunta:"\xBFCu\xE1l es el espacio muestral S de la evaluaci\xF3n de los dos lotes y el suceso E de que al menos un lote sea Extra Virgen (E)?",opciones:["S = {EE, EV, EC, VE, VV, VC, CE, CV, CC}, E = {EE, EV, EC, VE, CE}","S = {EE, EV, EC, VE, VV, VC, CE, CV, CC}, E = {EE, VV, CC}","S = {E, V, C}, E = {E}","S = {EE, VV, CC}, E = {EE}"],correcta:0,retroalimentacion:"Para dos lotes evaluados en tres categor\xEDas, hay 3\xB2 = 9 resultados posibles en S. El suceso E de 'al menos un lote Extra Virgen' incluye todas las parejas donde figura al menos una 'E': {EE, EV, EC, VE, CE}."},{id:103,municipio:"Puerto As\xEDs",tema:"Transporte de Combustible Alternativo",contexto:"En el muelle de Puerto As\xEDs se inspeccionan dos camiones cisterna para verificar si transportan biodi\xE9sel. Los resultados posibles para cada cami\xF3n son Conforme (C) o No Conforme (N).",pregunta:"\xBFCu\xE1l es el espacio muestral S de la inspecci\xF3n y el suceso E de que exactamente un cami\xF3n sea Conforme?",opciones:["S = {CC, CN, NC, NN}, E = {CN, NC}","S = {CC, NN}, E = {CN}","S = {C, N}, E = {C}","S = {CC, CN, NC, NN}, E = {CC, NN}"],correcta:0,retroalimentacion:"Con dos camiones evaluados de forma binaria, el espacio muestral es S = {CC, CN, NC, NN}. El suceso de que exactamente uno sea conforme agrupa los dos casos mixtos: E = {CN, NC}."},{id:104,municipio:"Valle del Sibundoy",tema:"Tejido de Mochilas de lana",contexto:"Una artesana del Valle del Sibundoy dispone de lana de tres colores: Amarillo (A), Verde (V) y Violeta (T). Selecciona dos colores distintos para tejer las franjas de una mochila tradicional sin importar el orden.",pregunta:"\xBFCu\xE1l es el espacio muestral S de las combinaciones de colores y el suceso E de que se incluya el color Violeta (T)?",opciones:["S = {AV, AT, VT}, E = {AT, VT}","S = {A, V, T}, E = {T}","S = {AV, AT, VT}, E = {AV}","S = {AA, VV, TT}, E = {TT}"],correcta:0,retroalimentacion:"Al seleccionar 2 colores diferentes de un grupo de 3 sin importar el orden, las combinaciones son 3: {AV, AT, VT}. El suceso de incluir el Violeta (T) est\xE1 compuesto por las muestras {AT, VT}."},{id:105,municipio:"Valle del Guamuez",tema:"Empaque de Palmitos",contexto:"En una planta empacadora de palmito en la Hormiga, se muestrean dos latas para verificar su sellado al vac\xEDo. Una lata puede estar Perfecta (P) o Filtrada (F).",pregunta:"\xBFCu\xE1l es el espacio muestral S y el suceso E de que ninguna de las latas est\xE9 Filtrada (F)?",opciones:["S = {PP, PF, FP, FF}, E = {PP}","S = {PP, PF, FP, FF}, E = {FF}","S = {P, F}, E = {P}","S = {PP, FF}, E = {PF, FP}"],correcta:0,retroalimentacion:"El espacio muestral de dos latas evaluadas es S = {PP, PF, FP, FF}. Que ninguna lata est\xE9 filtrada significa que ambas deben estar perfectas, por lo que el suceso contiene un solo elemento: E = {PP}."},{id:106,municipio:"Puerto Legu\xEDzamo",tema:"Monitoreo del Caim\xE1n Negro",contexto:"Un guardabosques del Parque Nacional Natural La Paya observa un ejemplar de caim\xE1n negro al azar y registra su estado de desarrollo: Cr\xEDa (C), Juvenil (J) o Adulto (A).",pregunta:"\xBFCu\xE1l es el espacio muestral S y el suceso E de que el caim\xE1n observado sea Juvenil o Adulto?",opciones:["S = {C, J, A}, E = {J, A}","S = {C, J, A}, E = {C}","S = {J, A}, E = {C, J, A}","S = {Juvenil, Adulto}, E = {Juvenil}"],correcta:0,retroalimentacion:"Las tres etapas posibles forman el espacio muestral completo S = {C, J, A}. El suceso de que sea Juvenil (J) o Adulto (A) es el subconjunto E = {J, A}."},{id:107,municipio:"Villagarz\xF3n",tema:"Siembra de \xC1rboles en Cuencas",contexto:"Estudiantes de Villagarz\xF3n plantan dos \xE1rboles en una cuenca h\xEDdrica y registran si sobreviven el primer mes: S\xED (S) o No (N).",pregunta:"\xBFCu\xE1l es el espacio muestral S de los dos \xE1rboles y el suceso E de que sobreviva al menos uno de ellos?",opciones:["S = {SS, SN, NS, NN}, E = {SS, SN, NS}","S = {SS, SN, NS, NN}, E = {SS}","S = {S, N}, E = {S}","S = {SS, NN}, E = {SN, NS}"],correcta:0,retroalimentacion:"El espacio muestral para dos \xE1rboles independientes es S = {SS, SN, NS, NN}. El suceso 'sobrevive al menos uno' abarca los resultados con un \xE1rbol vivo o con ambos vivos: E = {SS, SN, NS}."},{id:108,municipio:"San Miguel",tema:"pH del Agua para Riego",contexto:"Un agr\xF3nomo mide el pH del agua en una finca productora de cacao en San Miguel. Clasifica la acidez como \xC1cida (A), Neutra (N) o Alcalina (L).",pregunta:"\xBFCu\xE1l es el espacio muestral S y el suceso E de que el agua no sea \xC1cida?",opciones:["S = {A, N, L}, E = {N, L}","S = {A, N, L}, E = {A}","S = {N, L}, E = {A, N, L}","S = {Neutra, Alcalina}, E = {Neutra}"],correcta:0,retroalimentacion:"Los tres estados forman S = {A, N, L}. El suceso 'no ser \xC1cida' excluye el elemento 'A', por lo tanto el conjunto queda definido como E = {N, L}."},{id:109,municipio:"Santiago",tema:"Piscina de Lodoterapia",contexto:"En Santiago, un operario de un centro tur\xEDstico anota si los pr\xF3ximos dos visitantes deciden entrar a la piscina de lodo volc\xE1nico: S\xED (S) o No (N).",pregunta:"\xBFCu\xE1l es el espacio muestral S de las decisiones de los dos visitantes y el suceso E de que ninguno de los dos decida entrar?",opciones:["S = {SS, SN, NS, NN}, E = {NN}","S = {SS, SN, NS, NN}, E = {SS}","S = {S, N}, E = {N}","S = {SS, NN}, E = {SN, NS}"],correcta:0,retroalimentacion:"El espacio muestral de dos decisiones consecutivas es S = {SS, SN, NS, NN}. El suceso de que ninguno entre corresponde \xFAnicamente a la pareja de respuestas negativas: E = {NN}."},{id:110,municipio:"San Francisco",tema:"Patios Productivos de plantas ex\xF3ticas",contexto:"En un patio productivo familiar en San Francisco, se eval\xFAan tres capullos de anturios para ver si florecen en color Rojo (R) o Amarillo (A). Se registran las flores resultantes.",pregunta:"\xBFCu\xE1l es el espacio muestral S y el suceso E de que exactamente dos de los tres capullos florezcan en color Rojo (R)?",opciones:["S = {RRR, RRA, RAR, RAA, ARR, ARA, AAR, AAA}, E = {RRA, RAR, ARR}","S = {RRR, RRA, RAR, RAA, ARR, ARA, AAR, AAA}, E = {RAA, ARA, AAR}","S = {RR, RA, AR, AA}, E = {RA, AR}","S = {RRR, AAA}, E = {RRA, RAR}"],correcta:0,retroalimentacion:"Para tres flores hay 2\xB3 = 8 posibles resultados en S. El suceso de que exactamente dos capullos florezcan de color Rojo (R) contiene los elementos con exactamente dos 'R' y una 'A': E = {RRA, RAR, ARR}."},{id:111,municipio:"Puerto Guzm\xE1n",tema:"Clasificaci\xF3n de Pl\xE1tano de Rechazo",contexto:"En una finca de pl\xE1tano en Puerto Guzm\xE1n, un agricultor clasifica un racimo rechazado por tama\xF1o como Peque\xF1o (P), Mediano (M) o Deforme (D).",pregunta:"\xBFCu\xE1l es el espacio muestral S de la clasificaci\xF3n y el suceso E de que el racimo sea catalogado como Peque\xF1o o Mediano?",opciones:["S = {P, M, D}, E = {P, M}","S = {P, M, D}, E = {D}","S = {P, M}, E = {P, M, D}","S = {Peque\xF1o, Mediano}, E = {Peque\xF1o}"],correcta:0,retroalimentacion:"Las tres opciones posibles componen el espacio muestral S = {P, M, D}. El suceso de que sea catalogado como Peque\xF1o (P) o Mediano (M) est\xE1 representado por el conjunto E = {P, M}."},{id:112,municipio:"Puerto Caicedo",tema:"Fermentaci\xF3n de Granos de Cacao",contexto:"En Puerto Caicedo, un t\xE9cnico eval\xFAa la fermentaci\xF3n de dos lotes de cacao clasificados como Excelente (E) o Deficiente (D).",pregunta:"\xBFCu\xE1l es el espacio muestral S de los dos lotes y el suceso E de que ambos tengan una fermentaci\xF3n Excelente?",opciones:["S = {EE, ED, DE, DD}, E = {EE}","S = {EE, ED, DE, DD}, E = {ED, DE, EE}","S = {E, D}, E = {E}","S = {EE, DD}, E = {ED, DE}"],correcta:0,retroalimentacion:"Las cuatro posibles combinaciones para dos lotes son S = {EE, ED, DE, DD}. El suceso de que ambos tengan excelente fermentaci\xF3n tiene un solo elemento: E = {EE}."},{id:113,municipio:"Mocoa",tema:"Fauna de la Reserva Suruma",contexto:"En la reserva natural Suruma, un gu\xEDa ambientalista registra si el pr\xF3ximo visitante observa una Danta (D), un Mono (M) o un Tuc\xE1n (T).",pregunta:"\xBFCu\xE1l es el espacio muestral S y el suceso E de que el animal observado no sea una Danta (D)?",opciones:["S = {D, M, T}, E = {M, T}","S = {D, M, T}, E = {D}","S = {M, T}, E = {D, M, T}","S = {Mono, Tuc\xE1n}, E = {Mono}"],correcta:0,retroalimentacion:"El espacio muestral contiene los tres animales S = {D, M, T}. El suceso de que no sea una Danta (D) se compone de los otros dos elementos restantes: E = {M, T}."},{id:114,municipio:"Valle del Sibundoy",tema:"Bebida de Chicha de Ma\xEDz",contexto:"Un sabedor ind\xEDgena en Sibundoy elabora dos vasijas de chicha de ma\xEDz y eval\xFAa el grado de fermentaci\xF3n de cada una como Fuerte (F) o Suave (S).",pregunta:"\xBFCu\xE1l es el espacio muestral S y el suceso E de que al menos una vasija tenga fermentaci\xF3n Fuerte (F)?",opciones:["S = {FF, FS, SF, SS}, E = {FF, FS, SF}","S = {FF, FS, SF, SS}, E = {FF}","S = {F, S}, E = {F}","S = {FF, SS}, E = {FS, SF}"],correcta:0,retroalimentacion:"Las cuatro combinaciones posibles son S = {FF, FS, SF, SS}. El suceso 'al menos una fuerte' abarca todos los resultados que poseen una o dos 'F': E = {FF, FS, SF}."},{id:115,municipio:"Puerto As\xEDs",tema:"Descarga de Mercanc\xEDas Fluviales",contexto:"En el puerto de Puerto As\xEDs, se registra si el pr\xF3ximo bote de carga transporta Madera (M), Alimentos (A) o Combustible (C).",pregunta:"\xBFCu\xE1l es el espacio muestral S y el suceso E de que la carga sea de Madera o de Alimentos?",opciones:["S = {M, A, C}, E = {M, A}","S = {M, A, C}, E = {C}","S = {M, A}, E = {M, A, C}","S = {Madera, Alimentos}, E = {Madera}"],correcta:0,retroalimentacion:"Las tres cargas posibles forman el espacio muestral completo S = {M, A, C}. El suceso de que transporte Madera (M) o Alimentos (A) es el subconjunto E = {M, A}."},{id:116,municipio:"Orito",tema:"Colecci\xF3n de Mariposas",contexto:"En un laboratorio de Orito, se examinan dos ejemplares de mariposas silvestres recolectadas para registrar su g\xE9nero: Hembra (H) o Macho (M).",pregunta:"\xBFCu\xE1l es el espacio muestral S y el suceso E de que el primer ejemplar examinado sea Hembra (H)?",opciones:["S = {HH, HM, MH, MM}, E = {HH, HM}","S = {HH, HM, MH, MM}, E = {HH, MM}","S = {H, M}, E = {H}","S = {HH, MM}, E = {HM, MH}"],correcta:0,retroalimentacion:"Las cuatro combinaciones posibles son S = {HH, HM, MH, MM}. El suceso de que el primer ejemplar sea Hembra (H) requiere que comience por 'H', dando E = {HH, HM}."},{id:117,municipio:"Villagarz\xF3n",tema:"Inoculantes para \xC1rboles",contexto:"T\xE9cnicos forestales de Villagarz\xF3n prueban dos dosis de micorrizas en pl\xE1ntulas de Cedro. Cada dosis puede resultar en crecimiento Acelerado (A) o Normal (N).",pregunta:"\xBFCu\xE1l es el espacio muestral S de las dos pl\xE1ntulas y el suceso E de que exactamente una pl\xE1ntula muestre un crecimiento Acelerado (A)?",opciones:["S = {AA, AN, NA, NN}, E = {AN, NA}","S = {AA, NN}, E = {AN}","S = {A, N}, E = {A}","S = {AA, AN, NA, NN}, E = {AA, NN}"],correcta:0,retroalimentacion:"Las combinaciones de resultados son S = {AA, AN, NA, NN}. El suceso de que exactamente una pl\xE1ntula tenga crecimiento acelerado corresponde a los resultados mixtos {AN, NA}."},{id:118,municipio:"Valle del Guamuez",tema:"Grosor del Palmito",contexto:"En la Hormiga, se mide el grosor de un tallo de palmito seleccionado al azar para conserva. Se clasifica en Delgado (D), Est\xE1ndar (E) o Grueso (G).",pregunta:"\xBFCu\xE1l es el espacio muestral S y el suceso E de que el grosor sea Est\xE1ndar o Delgado?",opciones:["S = {D, E, G}, E = {D, E}","S = {D, E, G}, E = {G}","S = {D, E}, E = {D, E, G}","S = {Delgado, Est\xE1ndar}, E = {Delgado}"],correcta:0,retroalimentacion:"Los tres grosores posibles constituyen S = {D, E, G}. El suceso de que sea Est\xE1ndar o Delgado est\xE1 formado por los elementos E = {D, E}."},{id:119,municipio:"Puerto Legu\xEDzamo",tema:"Avistamiento
