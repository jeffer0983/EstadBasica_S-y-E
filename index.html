e Pimienta",contexto:"Un productor de la Asociación de Pimienteros de Orito inspecciona la calidad de tres sacos de pimienta negra recién cosechados de su chagra. Registra si cada saco cumple con el estándar de exportación de calidad Alta (A) o no (N).",pregunta:"¿Cuál es el espacio muestral (S) de los tres sacos inspeccionados y el suceso (E) de que al menos dos de ellos tengan calidad Alta (A)?",opciones:["S = {AAA, AAN, ANA, ANN, NAA, NAN, NNA, NNN}, E = {AAA, AAN, ANA, NAA}","S = {AA, AN, NA, NN}, E = {AA, AN}","S = {AAA, AAN, ANA, NAA}, E = {AAA, NNN}","S = {AAA, AAN, ANA, ANN, NAA, NAN, NNA, NNN}, E = {ANN, NAN, NNA, NNN}"],correcta:0,retroalimentacion:"Para tres sacos independientes con dos opciones cada uno, hay 2³ = 8 resultados posibles que forman el espacio muestral S. El suceso E ('al menos dos sacos de calidad Alta') agrupa los resultados que tienen dos o tres 'A': {AAA, AAN, ANA, NAA}."},{id:3,municipio:"Valle del Sibundoy",tema:"Artesanías Kamëntsá",contexto:"En un taller de artesanías en Sibundoy, una maestra indígena selecciona al azar una máscara tallada en madera de sauce. En la mesa tiene máscaras de la Alegría (A), del Dolor (D) y de la Sabiduría (S).",pregunta:"Si la maestra toma una máscara al azar para pulirla, ¿cuál es el espacio muestral (S) de los diseños disponibles y el suceso (E) de seleccionar una máscara que no represente el Dolor?",opciones:["S = {A, D, S}, E = {A, S}","S = {A, D, S}, E = {D}","S = {Alegría, Sabiduría}, E = {Alegría}","S = {A, D, S, M}, E = {A, D, S}"],correcta:0,retroalimentacion:"Los resultados posibles (tipos de diseño de máscara) son {A, D, S}, formando el espacio muestral S. El suceso 'no representar el Dolor' excluye el elemento D, por lo que E = {A, S}."},{id:4,municipio:"Puerto Asís",tema:"Navegación en el Río Putumayo",contexto:"Un estudiante de Grado 10° observa las embarcaciones que llegan al muelle de Puerto Asís desde el río Putumayo. En un intervalo de tiempo, registra si las próximas dos embarcaciones son Lanchas Motoras (L) o Canoas Tradicionales (C).",pregunta:"¿Cuál es el espacio muestral (S) de las dos embarcaciones observadas y el suceso (E) de que pase exactamente una lancha motora?",opciones:["S = {LL, LC, CL, CC}, E = {LC, CL}","S = {LL, CC}, E = {LC}","S = {L, C}, E = {L}","S = {LL, LC, CL, CC}, E = {LL, CC}"],correcta:0,retroalimentacion:"Al registrar dos embarcaciones consecutivas, se obtienen 4 combinaciones ordenadas en el espacio muestral S. El suceso de que pase exactamente una lancha corresponde a las combinaciones {LC, CL}."},{id:5,municipio:"Puerto Leguízamo",tema:"Tortugas Charapa",contexto:"En el Parque Nacional Natural La Paya en Puerto Leguízamo, un guardabosques monitorea un nido de tortugas Charapa. Al nacer, clasifica el tamaño del caparazón de una tortuga recién nacida seleccionada al azar como Pequeño (P), Mediano (M) o Grande (G).",pregunta:"¿Cuál es el espacio muestral (S) de la clasificación del tamaño y el suceso (E) de que la tortuga sea de tamaño Mediano o Grande?",opciones:["S = {P, M, G}, E = {M, G}","S = {P, M, G}, E = {P, M}","S = {P, M, G}, E = {M}","S = {Charapa}, E = {Grande}"],correcta:0,retroalimentacion:"Los tres posibles tamaños forman el espacio muestral completo S = {P, M, G}. El suceso de que el tamaño sea Mediano o Grande está dado por el subconjunto E = {M, G}."},{id:6,municipio:"Villagarzón",tema:"Avistamiento de Aves en Chaluayaco",contexto:"Un grupo de jóvenes investigadores en la Reserva Chaluayaco de Villagarzón busca identificar aves endémicas. Clasifican el siguiente ejemplar observado según su color predominante: Verde (V), Azul (A), o Rojo (R).",pregunta:"¿Cuál es el espacio muestral (S) de la observación y el suceso (E) de que el ave observada no sea de color Rojo?",opciones:["S = {V, A, R}, E = {V, A}","S = {V, A, R}, E = {R}","S = {V, A}, E = {V, A, R}","S = {Verde, Azul}, E = {Verde}"],correcta:0,retroalimentacion:"Los tres colores posibles forman el espacio muestral S = {V, A, R}. El suceso de que 'no sea de color Rojo' excluye la opción R, resultando en el conjunto E = {V, A}."},{id:7,municipio:"Valle del Guamuez",tema:"Cosecha de Chontaduro",contexto:"En una parcela del Valle del Guamuez, un agricultor selecciona dos chontaduros de un racimo recién cosechado y califica su madurez como Pintón (P) o Maduro (M).",pregunta:"¿Cuál es el espacio muestral (S) de los dos chontaduros evaluados y el suceso (E) de que al menos uno de ellos esté Maduro (M)?",opciones:["S = {PP, PM, MP, MM}, E = {PM, MP, MM}","S = {PP, PM, MP, MM}, E = {MM}","S = {P, M}, E = {M}","S = {PP, MM}, E = {PM, MP}"],correcta:0,retroalimentacion:"El espacio muestral de dos chontaduros consta de 4 elementos S = {PP, PM, MP, MM}. El suceso 'al menos uno maduro' significa que puede haber uno o ambos maduros, dando E = {PM, MP, MM}."},{id:8,municipio:"Mocoa",tema:"Plantas de la Chagra Indígena",contexto:"En una chagra tradicional Kamëntsá en Mocoa, un taita curandero recolecta dos plantas medicinales sagradas de entre tres especies disponibles: Llantén (L), Ortiga (O) y Cuti (C). Las recolecta una a una en orden y sin repetición.",pregunta:"¿Cuál es el espacio muestral (S) de las parejas ordenadas de plantas recolectadas y el suceso (E) de que la primera planta recolectada sea Ortiga (O)?",opciones:["S = {LO, LC, OL, OC, CL, CO}, E = {OL, OC}","S = {LO, LC, OC}, E = {OL}","S = {L, O, C}, E = {O}","S = {LO, LC, OL, OC, CL, CO}, E = {LO, CO}"],correcta:0,retroalimentacion:"Al extraer dos plantas diferentes en orden, hay 6 parejas ordenadas posibles que forman S. Las parejas que comienzan por Ortiga (O) son {OL, OC}, lo cual define el suceso E."},{id:9,municipio:"Puerto Guzmán",tema:"Pesca en el Río Caquetá",contexto:"Un pescador artesanal de Puerto Guzmán extrae un pez de su red en el caudaloso río Caquetá. El pez puede pertenecer a una de tres especies de gran aprecio comercial: Pintadillo (P), Bocachico (B) o Sabaleta (S).",pregunta:"¿Cuál es el espacio muestral (S) de la especie del pez capturado y el suceso (E) de que el pez sea un Bocachico o un Pintadillo?",opciones:["S = {P, B, S}, E = {P, B}","S = {P, B, S}, E = {S}","S = {P, B}, E = {P, B, S}","S = {Pintadillo, Bocachico}, E = {Pintadillo}"],correcta:0,retroalimentacion:"Las tres especies posibles que pueden salir en la pesca constituyen el espacio muestral completo S = {P, B, S}. El suceso de que sea Bocachico (B) o Pintadillo (P) es el subconjunto E = {P, B}."},{id:10,municipio:"Santiago",tema:"Aguas Termales de Colón",contexto:"Se monitorea la temperatura de las piscinas de aguas termales en Colón (Santiago). Se registra si en dos días seguidos la temperatura del agua supera los 38°C, anotando Sí (S) o No (N).",pregunta:"¿Cuál es el espacio muestral (S) de los dos días registrados y el suceso (E) de que no se superen los 38°C en ninguno de los dos días?",opciones:["S = {SS, SN, NS, NN}, E = {NN}","S = {SS, SN, NS, NN}, E = {SS}","S = {S, N}, E = {N}","S = {SS, NN}, E = {SN, NS}"],correcta:0,retroalimentacion:"Con dos días de medición, el espacio de resultados posibles tiene 4 elementos. Que no se superen los 38°C en ninguno de los dos días se reduce al único caso donde ambos días son negativos: E = {NN}."},{id:11,municipio:"San Francisco",tema:"Floración de Orquídeas",contexto:"En un vivero de conservación forestal en San Francisco, se evalúan tres capullos de orquídeas exóticas para ver si florecen en la semana: Sí (S) o No (N).",pregunta:"¿Cuál es el espacio muestral (S) y el suceso (E) de que florezcan exactamente dos de las tres orquídeas?",opciones:["S = {SSS, SSN, SNS, SNN, NSS, NSN, NNS, NNN}, E = {SSN, SNS, NSS}","S = {SSS, SSN, SNS, SNN, NSS, NSN, NNS, NNN}, E = {SNN, NSN, NNS}","S = {SS, SN, NS, NN}, E = {SN, NS}","S = {SSS, NNN}, E = {SSN, SNS}"],correcta:0,retroalimentacion:"Al evaluar tres capullos hay 2³ = 8 resultados posibles en S. El suceso de que florezcan exactamente dos requiere combinaciones con dos letras 'S' y una 'N': {SSN, SNS, NSS}."},{id:12,municipio:"Orito",tema:"Cámaras Trampa en Ingi-Andé",contexto:"En un sendero ecológico de la Reserva Nacional Ingi-Andé de Orito, se instala una cámara trampa. Se registra si el próximo mamífero mediano fotografiado es un Armadillo (A), un Cusumbo (C) o una Guagua (G).",pregunta:"¿Cuál es el espacio muestral (S) del mamífero registrado y el suceso (E) de que la cámara capte un Armadillo o una Guagua?",opciones:["S = {A, C, G}, E = {A, G}","S = {A, C, G}, E = {C}","S = {Armadillo, Guagua}, E = {Armadillo}","S = {A, C, G}, E = {A, C, G}"],correcta:0,retroalimentacion:"Las tres especies constituyen el espacio muestral S = {A, C, G}. El suceso de captar Armadillo o Guagua se representa mediante el subconjunto E = {A, G}."},{id:13,municipio:"Puerto Caicedo",tema:"Calidad de Cacao Orgánico",contexto:"Una asociación de cacaoteros en Puerto Caicedo clasifica sus barras de chocolate artesanal según su porcentaje de cacao en tres categorías exclusivas: Suave (S), Semiamargo (M) y Amargo (A).",pregunta:"Si un catador toma una barra de chocolate al azar, ¿cuál es el espacio muestral (S) y el suceso (E) de que el chocolate elegido sea Amargo o Semiamargo?",opciones:["S = {S, M, A}, E = {M, A}","S = {S, M, A}, E = {S, M}","S = {M, A}, E = {A}","S = {Suave, Amargo}, E = {Amargo}"],correcta:0,retroalimentacion:"El espacio muestral agrupa las tres categorías posibles de sabor S = {S, M, A}. El suceso de que sea Amargo (A) o Semiamargo (M) corresponde al subconjunto E = {M, A}."},{id:14,municipio:"San Miguel",tema:"Monitoreo Ambiental de Ríos",contexto:"En el municipio fronterizo de San Miguel, ingenieros ambientales toman una muestra de agua del río San Miguel para evaluar su nivel de turbidez, clasificándolo en Bajo (B), Medio (M) o Alto (A).",pregunta:"¿Cuál es el espacio muestral (S) del análisis de turbidez y el suceso (E) de que la turbidez sea de nivel Bajo o Medio?",opciones:["S = {B, M, A}, E = {B, M}","S = {B, M, A}, E = {A}","S = {B, M}, E = {B, M, A}","S = {Bajo, Medio}, E = {Bajo}"],correcta:0,retroalimentacion:"Los tres estados de turbidez posibles forman el espacio muestral S = {B, M, A}. El suceso de que la turbidez esté dentro del rango aceptable (Bajo o Medio) es E = {B, M}."},{id:15,municipio:"Mocoa",tema:"Corrientes en el Río Rumiyaco",contexto:"Un estudiante en las playas del río Rumiyaco en Mocoa lanza un flotador biodegradable al río y observa si este es arrastrado por la corriente hacia la Orilla Izquierda (I), la Orilla Derecha (D) o si sigue recto por el Centro (C).",pregunta:"¿Cuál es el espacio muestral (S) de la trayectoria y el suceso (E) de que el flotador no termine en la Orilla Derecha?",opciones:["S = {I, D, C}, E = {I, C}","S = {I, D, C}, E = {D}","S = {I, C}, E = {I, D, C}","S = {Izquierda, Centro}, E = {Izquierda}"],correcta:0,retroalimentacion:"Los posibles caminos del flotador son {I, D, C}. Al excluir la Orilla Derecha (D), el suceso de interés queda definido por las trayectorias restantes: E = {I, C}."},{id:16,municipio:"Valle del Sibundoy",tema:"Instrumentos del Carnaval Kamëntsá",contexto:"Un joven músico de Sibundoy tiene tres instrumentos sagrados hechos a mano: un Tambor (T), una Flauta (F) y un Capador (C). Elige dos instrumentos al azar para participar en la comparsa del Clatsh (sin repetición y sin importar el orden).",pregunta:"¿Cuál es el espacio muestral (S) de las combinaciones de instrumentos elegidos y el suceso (E) de que la Flauta (F) sea uno de los instrumentos seleccionados?",opciones:["S = {TF, TC, FC}, E = {TF, FC}","S = {T, F, C}, E = {F}","S = {TF, TC, FC}, E = {TC}","S = {TF, TC, FC}, E = {TF, TC, FC}"],correcta:0,retroalimentacion:"Al seleccionar 2 elementos de un grupo de 3 sin orden, las combinaciones posibles son {TF, TC, FC}. El suceso en el que participa la flauta está constituido por las parejas E = {TF, FC}."},{id:17,municipio:"Puerto Asís",tema:"Avistamiento de Delfines Rosados",contexto:"Durante un paseo en lancha por el río Putumayo saliendo de Puerto Asís, un fotógrafo realiza dos paradas de observación. En cada parada, registra si logra fotografiar al hermoso Delfín Rosado de río: Sí (S) o No (N).",pregunta:"¿Cuál es el espacio muestral (S) de las dos observaciones y el suceso (E) de que logre fotografiar al delfín en al menos una de las paradas?",opciones:["S = {SS, SN, NS, NN}, E = {SS, SN, NS}","S = {SS, SN, NS, NN}, E = {SS}","S = {S, N}, E = {S}","S = {SS, NN}, E = {SN, NS}"],correcta:0,retroalimentacion:"Las cuatro combinaciones posibles de dos avistamientos independientes componen S. El suceso 'al menos una de las paradas' implica tener 1 o 2 respuestas afirmativas, es decir, E = {SS, SN, NS}."},{id:18,municipio:"Orito",tema:"Cosecha de Asaí Silvestre",contexto:"Una cooperativa de familias recolectoras en Orito selecciona dos racimos de asaí silvestre en la selva para procesar pulpa. Mide su grado de madurez como Verde (V) o Maduro (M).",pregunta:"¿Cuál es el espacio muestral (S) de las dos muestras de asaí y el suceso (E) de que ambos racimos estén maduros?",opciones:["S = {VV, VM, MV, MM}, E = {MM}","S = {VV, VM, MV, MM}, E = {VM, MV, MM}","S = {V, M}, E = {M}","S = {VV, MM}, E = {VM, MV}"],correcta:0,retroalimentacion:"Al evaluar dos racimos independientes, el espacio muestral S tiene 4 elementos. El suceso de que ambos estén maduros corresponde al caso único en el que ambos son 'M': E = {MM}."},{id:19,municipio:"Villagarzón",tema:"Frutales de Copoazú",contexto:"Un técnico agrícola en Villagarzón evalúa dos árboles de Copoazú de un cultivo piloto para verificar si presentan resistencia a plagas comunes de la región, anotando Resistente (R) o Susceptible (S).",pregunta:"¿Cuál es el espacio muestral (S) de los dos árboles evaluados y el suceso (E) de que exactamente uno de los dos árboles sea Resistente (R)?",opciones:["S = {RR, RS, SR, SS}, E = {RS, SR}","S = {RR, SS}, E = {RS}","S = {R, S}, E = {R}","S = {RR, RS, SR, SS}, E = {RR, SS}"],correcta:0,retroalimentacion:"Las combinaciones de resistencia para dos árboles son 4. El suceso 'exactamente uno resistente' excluye que ambos lo sean o que ninguno lo sea, lo que nos deja con E = {RS, SR}."},{id:20,municipio:"Puerto Guzmán",tema:"Semillero de Oradores Escolares",contexto:"Un docente de una escuela rural de Puerto Guzmán selecciona dos estudiantes en orden para exponer sobre mitos de la selva. Registra si cada estudiante seleccionado es Masculino (M) o Femenino (F).",pregunta:"¿Cuál es el espacio muestral (S) de los géneros de los dos expositores y el suceso (E) de que el primer expositor seleccionado sea de género Femenino (F)?",opciones:["S = {MM, MF, FM, FF}, E = {FM, FF}","S = {MM, FF}, E = {FM}","S = {M, F}, E = {F}","S = {MM, MF, FM, FF}, E = {MF, FM}"],correcta:0,retroalimentacion:"El espacio muestral de géneros ordenados para dos personas es S = {MM, MF, FM, FF}. El suceso de que la primera persona sea mujer requiere que la primera letra sea 'F', resultando E = {FM, FF}."},{id:21,municipio:"Santiago",tema:"Senderos Ecológicos",contexto:"Un operador turístico en Santiago clasifica la dificultad de tres caminos prehispánicos locales como Fácil (F), Moderada (M) o Difícil (D). Elige un camino al azar para un grupo escolar.",pregunta:"¿Cuál es el espacio muestral (S) y el suceso (E) de que el sendero elegido sea de dificultad Moderada o Fácil?",opciones:["S = {F, M, D}, E = {F, M}","S = {F, M, D}, E = {M, D}","S = {F, M}, E = {F, M, D}","S = {Fácil, Moderada}, E = {Fácil}"],correcta:0,retroalimentacion:"El espacio de dificultad tiene tres posibles estados {F, M, D}. El suceso de que sea Moderada o Fácil corresponde al subconjunto E = {F, M}."},{id:22,municipio:"San Francisco",tema:"Tejido de Fajas Tradicionales",contexto:"Una artesana en San Francisco teje una faja tradicional utilizando hilos de colores naturales de la Amazonía. Selecciona al azar dos colores de su cesta que contiene hilos de color Negro (N), Blanco (B) y Rojo (R) (sin repetición y sin importar el orden).",pregunta:"¿Cuál es el espacio muestral (S) de las combinaciones de colores elegidos y el suceso (E) de que el color Rojo (R) sea seleccionado?",opciones:["S = {NB, NR, BR}, E = {NR, BR}","S = {N, B, R}, E = {R}","S = {NB, NR, BR}, E = {NB}","S = {NB, NR, BR}, E = {NB, NR, BR}"],correcta:0,retroalimentacion:"Al seleccionar 2 colores entre 3 sin importar el orden y sin repetir, se obtienen 3 combinaciones. El suceso en el cual participa el color Rojo está compuesto por las parejas E = {NR, BR}."},{id:23,municipio:"Puerto Caicedo",tema:"Avistamiento del Oso de Anteojos",contexto:"En un proyecto de monitoreo ambiental en las montañas de Puerto Caicedo, biólogos registran si logran avistar al Oso de Anteojos andino durante dos días seguidos: Avistado (A) o No Avistado (N).",pregunta:"¿Cuál es el espacio muestral (S) de las observaciones de los dos días y el suceso (E) de que se observe al oso en al menos uno de los días?",opciones:["S = {AA, AN, NA, NN}, E = {AA, AN, NA}","S = {AA, AN, NA, NN}, E = {AA}","S = {A, N}, E = {A}","S = {AA, NN}, E = {AN, NA}"],correcta:0,retroalimentacion:"Con dos días de observación hay 4 combinaciones posibles. El suceso de observar al oso al menos un día abarca los casos con 1 o 2 avistamientos: E = {AA, AN, NA}."},{id:24,municipio:"Valle del Guamuez",tema:"Feria del Chontaduro Gigante",contexto:"En una exposición agrícola en la Hormiga (Valle del Guamuez), un jurado experto evalúa la calidad y tamaño de un chontaduro excepcional presentado a concurso, clasificándolo como Mediano (M), Grande (G) o Extra Grande (X).",pregunta:"¿Cuál es el espacio muestral (S) de la clasificación del jurado y el suceso (E) de que reciba una calificación superior a Mediano?",opciones:["S = {M, G, X}, E = {G, X}","S = {M, G, X}, E = {M}","S = {G, X}, E = {M, G, X}","S = {Grande, Extra}, E = {Grande}"],correcta:0,retroalimentacion:"La escala de evaluación contiene tres categorías, por tanto S = {M, G, X}. El suceso de que reciba una calificación superior a Mediano agrupa a Grande (G) y Extra Grande (X), dando E = {G, X}."},{id:25,municipio:"San Miguel",tema:"Acidez de Suelo para Cacao",contexto:"Ingenieros agrónomos en el municipio fronterizo de San Miguel analizan el suelo de dos parcelas de cacao para clasificar la acidez del terreno como Ácido (A) o Neutro (N).",pregunta:"¿Cuál es el espacio muestral (S) de las dos parcelas evaluadas y el suceso (E) de que ninguna de las parcelas tenga un suelo de tipo Ácido (A)?",opciones:["S = {AA, AN, NA, NN}, E = {NN}","S = {AA, AN, NA, NN}, E = {AA}","S = {A, N}, E = {N}","S = {AA, NN}, E = {AN, NA}"],correcta:0,retroalimentacion:"El análisis de dos parcelas nos da 4 combinaciones de resultados. Que ninguna tenga suelo Ácido significa que ambas son Neutras, definiendo el suceso E = {NN}."},{id:26,municipio:"Mocoa",tema:"Orquídeas de la Reserva Suruma",contexto:"En la Reserva Suruma de Mocoa, un guía ambientalista muestra una orquídea silvestre a unos estudiantes y les pide identificar si es terrestre (T), epífita (E) o litófita (L).",pregunta:"¿Cuál es el espacio muestral (S) de la clasificación de la orquídea y el suceso (E) de que la planta sea epífita o terrestre?",opciones:["S = {T, E, L}, E = {T, E}","S = {T, E, L}, E = {L}","S = {T, E}, E = {T, E, L}","S = {Epífita, Terrestre}, E = {Epífita}"],correcta:0,retroalimentacion:"Las tres clasificaciones forman el espacio muestral S = {T, E, L}. El suceso de que sea epífita o terrestre está dado por el conjunto E = {T, E}."},{id:27,municipio:"Puerto Asís",tema:"Exportación de Palmitos",contexto:"Un analista de aduanas de Puerto Asís monitorea dos cargamentos de palmitos amazónicos y clasifica el mercado de destino de cada uno como Nacional (N) o Internacional (I).",pregunta:"¿Cuál es el espacio muestral (S) de los mercados de destino de ambos cargamentos y el suceso (E) de que al menos uno de ellos tenga destino Internacional (I)?",opciones:["S = {NN, NI, IN, II}, E = {NI, IN, II}","S = {NN, NI, IN, II}, E = {II}","S = {N, I}, E = {I}","S = {NN, II}, E = {NI, IN}"],correcta:0,retroalimentacion:"La clasificación de destinos para dos cargamentos genera 4 posibilidades. El suceso 'al menos uno de destino internacional' incluye los resultados con uno o dos destinos internacionales, por lo que E = {NI, IN, II}."},{id:28,municipio:"Orito",tema:"Polinización de Mariposas Morpho",contexto:"En un mariposario de Orito, un biólogo observa el vuelo de dos espectaculares mariposas morpho azules y registra si se posan en flores de orquídeas (O) o de heliconias (H).",pregunta:"¿Cuál es el espacio muestral (S) de los posaderos elegidos por las dos mariposas y el suceso (E) de que ambas elijan posarse sobre orquídeas (O)?",opciones:["S = {OO, OH, HO, HH}, E = {OO}","S = {OO, OH, HO, HH}, E = {OH, HO, HH}","S = {O, H}, E = {O}","S = {OO, HH}, E = {OH, HO}"],correcta:0,retroalimentacion:"Las combinaciones de posaderos de dos mariposas son 4. El suceso de que ambas seleccionen orquídeas se reduce al único elemento donde ambas eligen orquídea: E = {OO}."},{id:29,municipio:"Puerto Guzmán",tema:"Producción de Plátano Hartón",contexto:"Un agricultor de Puerto Guzmán inspecciona la sanidad de dos racimos de plátano recién recolectados de su plantación familiar, clasificando cada racimo como Aceptable (A) o Defectuoso (D) por manchas de insectos.",pregunta:"¿Cuál es el espacio muestral (S) de los dos racimos evaluados y el suceso (E) de que exactamente uno de ellos sea Aceptable (A)?",opciones:["S = {AA, AD, DA, DD}, E = {AD, DA}","S = {AA, DD}, E = {AD}","S = {A, D}, E = {A}","S = {AA, AD, DA, DD}, E = {AA, DD}"],correcta:0,retroalimentacion:"La combinación de estados para dos racimos de plátano da 4 resultados posibles. El suceso 'exactamente un racimo aceptable' corresponds a las parejas mixtas: E = {AD, DA}."},{id:30,municipio:"Valle del Sibundoy",tema:"Pintura Tradicional",contexto:"En Sibundoy, un joven de la comunidad Kamëntsá selecciona al azar una pintura de origen natural para colorear un cuadro de la chagra de su abuelo. Su paleta tiene colores Amarillo (A), Verde (V) o Negro (N).",pregunta:"¿Cuál es el espacio muestral (S) del color seleccionado y el suceso (E) de que el color elegido no sea Negro (N)?",opciones:["S = {A, V, N}, E = {A, V}","S = {A, V, N}, E = {N}","S = {A, V}, E = {A, V, N}","S = {Amarillo, Verde}, E = {Amarillo}"],correcta:0,retroalimentacion:"El espacio muestral agrupa los tres colores disponibles S = {A, V, N}. El suceso de que no se elija el color Negro corresponde a las opciones restantes, resultando en E = {A, V}."}],f4=[{id:101,municipio:"Mocoa",tema:"Senderismo en la Cascada Hornoyaco",contexto:"Un turista en Mocoa decide visitar la Cascada Hornoyaco. En el trayecto puede encontrar clima Lluvioso (LL), Nublado (N) o Despejado (D). Se registra el clima observado en dos tramos consecutivos del camino.",pregunta:"¿Cuál es el espacio muestral S de los climas en los dos tramos y el suceso E de que el clima esté despejado en al menos uno de los tramos?",opciones:["S = {LLLL, LLN, LLD, NLL, NN, ND, DLL, DN, DD}, E = {LLD, ND, DLL, DN, DD}","S = {LL-LL, LL-N, LL-D, N-LL, N-N, N-D, D-LL, D-N, D-D}, E = {LL-D, N-D, D-LL, D-N, D-D}","S = {LL, LN, LD, NL, NN, ND, DL, DN, DD}, E = {LD, ND, DL, DN, DD}","S = {Lluvia, Despejado}, E = {Despejado}"],correcta:2,retroalimentacion:"Al registrar el clima en dos tramos con 3 estados posibles cada uno, el espacio muestral S contiene 3² = 9 resultados posibles (LL, LN, LD, NL, NN, ND, DL, DN, DD). El suceso de que esté despejado (D) en al menos un tramo agrupa todos los pares que contienen la letra 'D', es decir: {LD, ND, DL, DN, DD}."},{id:102,municipio:"Orito",tema:"Extracción de Aceite de Sacha Inchi",contexto:"En una planta procesadora de Orito, se analiza la pureza de dos lotes de aceite de Sacha Inchi. Cada lote puede catalogarse como Extra Virgen (E), Virgen (V) o Corriente (C).",pregunta:"¿Cuál es el espacio muestral S de la evaluación de los dos lotes y el suceso E de que al menos un lote sea Extra Virgen (E)?",opciones:["S = {EE, EV, EC, VE, VV, VC, CE, CV, CC}, E = {EE, EV, EC, VE, CE}","S = {EE, EV, EC, VE, VV, VC, CE, CV, CC}, E = {EE, VV, CC}","S = {E, V, C}, E = {E}","S = {EE, VV, CC}, E = {EE}"],correcta:0,retroalimentacion:"Para dos lotes evaluados en tres categorías, hay 3² = 9 resultados posibles en S. El suceso E de 'al menos un lote Extra Virgen' incluye todas las parejas donde figura al menos una 'E': {EE, EV, EC, VE, CE}."},{id:103,municipio:"Puerto Asís",tema:"Transporte de Combustible Alternativo",contexto:"En el muelle de Puerto Asís se inspeccionan dos camiones cisterna para verificar si transportan biodiésel. Los resultados posibles para cada camión son Conforme (C) o No Conforme (N).",pregunta:"¿Cuál es el espacio muestral S de la inspección y el suceso E de que exactamente un camión sea Conforme?",opciones:["S = {CC, CN, NC, NN}, E = {CN, NC}","S = {CC, NN}, E = {CN}","S = {C, N}, E = {C}","S = {CC, CN, NC, NN}, E = {CC, NN}"],correcta:0,retroalimentacion:"Con dos camiones evaluados de forma binaria, el espacio muestral es S = {CC, CN, NC, NN}. El suceso de que exactamente uno sea conforme agrupa los dos casos mixtos: E = {CN, NC}."},{id:104,municipio:"Valle del Sibundoy",tema:"Tejido de Mochilas de lana",contexto:"Una artesana del Valle del Sibundoy dispone de lana de tres colores: Amarillo (A), Verde (V) y Violeta (T). Selecciona dos colores distintos para tejer las franjas de una mochila tradicional sin importar el orden.",pregunta:"¿Cuál es el espacio muestral S de las combinaciones de colores y el suceso E de que se incluya el color Violeta (T)?",opciones:["S = {AV, AT, VT}, E = {AT, VT}","S = {A, V, T}, E = {T}","S = {AV, AT, VT}, E = {AV}","S = {AA, VV, TT}, E = {TT}"],correcta:0,retroalimentacion:"Al seleccionar 2 colores diferentes de un grupo de 3 sin importar el orden, las combinaciones son 3: {AV, AT, VT}. El suceso de incluir el Violeta (T) está compuesto por las muestras {AT, VT}."},{id:105,municipio:"Valle del Guamuez",tema:"Empaque de Palmitos",contexto:"En una planta empacadora de palmito en la Hormiga, se muestrean dos latas para verificar su sellado al vacío. Una lata puede estar Perfecta (P) o Filtrada (F).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que ninguna de las latas esté Filtrada (F)?",opciones:["S = {PP, PF, FP, FF}, E = {PP}","S = {PP, PF, FP, FF}, E = {FF}","S = {P, F}, E = {P}","S = {PP, FF}, E = {PF, FP}"],correcta:0,retroalimentacion:"El espacio muestral de dos latas evaluadas es S = {PP, PF, FP, FF}. Que ninguna lata esté filtrada significa que ambas deben estar perfectas, por lo que el suceso contiene un solo elemento: E = {PP}."},{id:106,municipio:"Puerto Leguízamo",tema:"Monitoreo del Caimán Negro",contexto:"Un guardabosques del Parque Nacional Natural La Paya observa un ejemplar de caimán negro al azar y registra su estado de desarrollo: Cría (C), Juvenil (J) o Adulto (A).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que el caimán observado sea Juvenil o Adulto?",opciones:["S = {C, J, A}, E = {J, A}","S = {C, J, A}, E = {C}","S = {J, A}, E = {C, J, A}","S = {Juvenil, Adulto}, E = {Juvenil}"],correcta:0,retroalimentacion:"Las tres etapas posibles forman el espacio muestral completo S = {C, J, A}. El suceso de que sea Juvenil (J) o Adulto (A) es el subconjunto E = {J, A}."},{id:107,municipio:"Villagarzón",tema:"Siembra de Árboles en Cuencas",contexto:"Estudiantes de Villagarzón plantan dos árboles en una cuenca hídrica y registran si sobreviven el primer mes: Sí (S) o No (N).",pregunta:"¿Cuál es el espacio muestral S de los dos árboles y el suceso E de que sobreviva al menos uno de ellos?",opciones:["S = {SS, SN, NS, NN}, E = {SS, SN, NS}","S = {SS, SN, NS, NN}, E = {SS}","S = {S, N}, E = {S}","S = {SS, NN}, E = {SN, NS}"],correcta:0,retroalimentacion:"El espacio muestral para dos árboles independientes es S = {SS, SN, NS, NN}. El suceso 'sobrevive al menos uno' abarca los resultados con un árbol vivo o con ambos vivos: E = {SS, SN, NS}."},{id:108,municipio:"San Miguel",tema:"pH del Agua para Riego",contexto:"Un agrónomo mide el pH del agua en una finca productora de cacao en San Miguel. Clasifica la acidez como Ácida (A), Neutra (N) o Alcalina (L).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que el agua no sea Ácida?",opciones:["S = {A, N, L}, E = {N, L}","S = {A, N, L}, E = {A}","S = {N, L}, E = {A, N, L}","S = {Neutra, Alcalina}, E = {Neutra}"],correcta:0,retroalimentacion:"Los tres estados forman S = {A, N, L}. El suceso 'no ser Ácida' excluye el elemento 'A', por lo tanto el conjunto queda definido como E = {N, L}."},{id:109,municipio:"Santiago",tema:"Piscina de Lodoterapia",contexto:"En Santiago, un operario de un centro turístico anota si los próximos dos visitantes deciden entrar a la piscina de lodo volcánico: Sí (S) o No (N).",pregunta:"¿Cuál es el espacio muestral S de las decisiones de los dos visitantes y el suceso E de que ninguno de los dos decida entrar?",opciones:["S = {SS, SN, NS, NN}, E = {NN}","S = {SS, SN, NS, NN}, E = {SS}","S = {S, N}, E = {N}","S = {SS, NN}, E = {SN, NS}"],correcta:0,retroalimentacion:"El espacio muestral de dos decisiones consecutivas es S = {SS, SN, NS, NN}. El suceso de que ninguno entre corresponde únicamente a la pareja de respuestas negativas: E = {NN}."},{id:110,municipio:"San Francisco",tema:"Patios Productivos de plantas exóticas",contexto:"En un patio productivo familiar en San Francisco, se evalúan tres capullos de anturios para ver si florecen en color Rojo (R) o Amarillo (A). Se registran las flores resultantes.",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que exactamente dos de los tres capullos florezcan en color Rojo (R)?",opciones:["S = {RRR, RRA, RAR, RAA, ARR, ARA, AAR, AAA}, E = {RRA, RAR, ARR}","S = {RRR, RRA, RAR, RAA, ARR, ARA, AAR, AAA}, E = {RAA, ARA, AAR}","S = {RR, RA, AR, AA}, E = {RA, AR}","S = {RRR, AAA}, E = {RRA, RAR}"],correcta:0,retroalimentacion:"Para tres flores hay 2³ = 8 posibles resultados en S. El suceso de que exactamente dos capullos florezcan de color Rojo (R) contiene los elementos con exactamente dos 'R' y una 'A': E = {RRA, RAR, ARR}."},{id:111,municipio:"Puerto Guzmán",tema:"Clasificación de Plátano de Rechazo",contexto:"En una finca de plátano en Puerto Guzmán, un agricultor clasifica un racimo rechazado por tamaño como Pequeño (P), Mediano (M) o Deforme (D).",pregunta:"¿Cuál es el espacio muestral S de la clasificación y el suceso E de que el racimo sea catalogado como Pequeño o Mediano?",opciones:["S = {P, M, D}, E = {P, M}","S = {P, M, D}, E = {D}","S = {P, M}, E = {P, M, D}","S = {Pequeño, Mediano}, E = {Pequeño}"],correcta:0,retroalimentacion:"Las tres opciones posibles componen el espacio muestral S = {P, M, D}. El suceso de que sea catalogado como Pequeño (P) o Mediano (M) está representado por el conjunto E = {P, M}."},{id:112,municipio:"Puerto Caicedo",tema:"Fermentación de Granos de Cacao",contexto:"En Puerto Caicedo, un técnico evalúa la fermentación de dos lotes de cacao clasificados como Excelente (E) o Deficiente (D).",pregunta:"¿Cuál es el espacio muestral S de los dos lotes y el suceso E de que ambos tengan una fermentación Excelente?",opciones:["S = {EE, ED, DE, DD}, E = {EE}","S = {EE, ED, DE, DD}, E = {ED, DE, EE}","S = {E, D}, E = {E}","S = {EE, DD}, E = {ED, DE}"],correcta:0,retroalimentacion:"Las cuatro posibles combinaciones para dos lotes son S = {EE, ED, DE, DD}. El suceso de que ambos tengan excelente fermentación tiene un solo elemento: E = {EE}."},{id:113,municipio:"Mocoa",tema:"Fauna de la Reserva Suruma",contexto:"En la reserva natural Suruma, un guía ambientalista registra si el próximo visitante observa una Danta (D), un Mono (M) o un Tucán (T).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que el animal observado no sea una Danta (D)?",opciones:["S = {D, M, T}, E = {M, T}","S = {D, M, T}, E = {D}","S = {M, T}, E = {D, M, T}","S = {Mono, Tucán}, E = {Mono}"],correcta:0,retroalimentacion:"El espacio muestral contiene los tres animales S = {D, M, T}. El suceso de que no sea una Danta (D) se compone de los otros dos elementos restantes: E = {M, T}."},{id:114,municipio:"Valle del Sibundoy",tema:"Bebida de Chicha de Maíz",contexto:"Un sabedor indígena en Sibundoy elabora dos vasijas de chicha de maíz y evalúa el grado de fermentación de cada una como Fuerte (F) o Suave (S).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que al menos una vasija tenga fermentación Fuerte (F)?",opciones:["S = {FF, FS, SF, SS}, E = {FF, FS, SF}","S = {FF, FS, SF, SS}, E = {FF}","S = {F, S}, E = {F}","S = {FF, SS}, E = {FS, SF}"],correcta:0,retroalimentacion:"Las cuatro combinaciones posibles son S = {FF, FS, SF, SS}. El suceso 'al menos una fuerte' abarca todos los resultados que poseen una o dos 'F': E = {FF, FS, SF}."},{id:115,municipio:"Puerto Asís",tema:"Descarga de Mercancías Fluviales",contexto:"En el puerto de Puerto Asís, se registra si el próximo bote de carga transporta Madera (M), Alimentos (A) o Combustible (C).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que la carga sea de Madera o de Alimentos?",opciones:["S = {M, A, C}, E = {M, A}","S = {M, A, C}, E = {C}","S = {M, A}, E = {M, A, C}","S = {Madera, Alimentos}, E = {Madera}"],correcta:0,retroalimentacion:"Las tres cargas posibles forman el espacio muestral completo S = {M, A, C}. El suceso de que transporte Madera (M) o Alimentos (A) es el subconjunto E = {M, A}."},{id:116,municipio:"Orito",tema:"Colección de Mariposas",contexto:"En un laboratorio de Orito, se examinan dos ejemplares de mariposas silvestres recolectadas para registrar su género: Hembra (H) o Macho (M).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que el primer ejemplar examinado sea Hembra (H)?",opciones:["S = {HH, HM, MH, MM}, E = {HH, HM}","S = {HH, HM, MH, MM}, E = {HH, MM}","S = {H, M}, E = {H}","S = {HH, MM}, E = {HM, MH}"],correcta:0,retroalimentacion:"Las cuatro combinaciones posibles son S = {HH, HM, MH, MM}. El suceso de que el primer ejemplar sea Hembra (H) requiere que comience por 'H', dando E = {HH, HM}."},{id:117,municipio:"Villagarzón",tema:"Inoculantes para Árboles",contexto:"Técnicos forestales de Villagarzón prueban dos dosis de micorrizas en plántulas de Cedro. Cada dosis puede resultar en crecimiento Acelerado (A) o Normal (N).",pregunta:"¿Cuál es el espacio muestral S de las dos plántulas y el suceso E de que exactamente una plántula muestre un crecimiento Acelerado (A)?",opciones:["S = {AA, AN, NA, NN}, E = {AN, NA}","S = {AA, NN}, E = {AN}","S = {A, N}, E = {A}","S = {AA, AN, NA, NN}, E = {AA, NN}"],correcta:0,retroalimentacion:"Las combinaciones de resultados son S = {AA, AN, NA, NN}. El suceso de que exactamente una plántula tenga crecimiento acelerado corresponde a los resultados mixtos {AN, NA}."},{id:118,municipio:"Valle del Guamuez",tema:"Grosor del Palmito",contexto:"En la Hormiga, se mide el grosor de un tallo de palmito seleccionado al azar para conserva. Se clasifica en Delgado (D), Estándar (E) o Grueso (G).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que el grosor sea Estándar o Delgado?",opciones:["S = {D, E, G}, E = {D, E}","S = {D, E, G}, E = {G}","S = {D, E}, E = {D, E, G}","S = {Delgado, Estándar}, E = {Delgado}"],correcta:0,retroalimentacion:"Los tres grosores posibles constituyen S = {D, E, G}. El suceso de que sea Estándar o Delgado está formado por los elementos E = {D, E}."},{id:119,municipio:"Puerto Leguízamo",tema:"Avistamiento de Manatíes",contexto:"Durante una expedición fluvial en Puerto Leguízamo se realizan dos recorridos en lancha. En cada recorrido, se anota si se observa al Manatí Amazónico: Sí (S) o No (N).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que se observe al manatí en ambos recorridos?",opciones:["S = {SS, SN, NS, NN}, E = {SS}","S = {SS, SN, NS, NN}, E = {SS, SN, NS}","S = {S, N}, E = {S}","S = {SS, NN}, E = {SN, NS}"],correcta:0,retroalimentacion:"El espacio muestral de dos recorridos es S = {SS, SN, NS, NN}. El suceso de observar al manatí en ambos recorridos es el elemento único E = {SS}."},{id:120,municipio:"San Miguel",tema:"Enfermedades del Cacao",contexto:"Un agrónomo en San Miguel revisa dos hojas de un árbol de cacao para ver si tienen Monilia (M) o si están Sanas (S).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que al menos una de las hojas tenga Monilia (M)?",opciones:["S = {MM, MS, SM, SS}, E = {MM, MS, SM}","S = {MM, MS, SM, SS}, E = {MM}","S = {M, S}, E = {M}","S = {MM, SS}, E = {MS, SM}"],correcta:0,retroalimentacion:"Con dos hojas revisadas de forma binaria, el espacio muestral tiene 4 resultados. El suceso 'al menos una con Monilia' agrupa las opciones {MM, MS, SM}."},{id:121,municipio:"Santiago",tema:"Artesanías en Arcilla",contexto:"Una artesana en Santiago elabora jarrones y clasifica el acabado final de dos piezas como Brillante (B) o Mate (M).",pregunta:"¿Cuál es el espacio muestral S de las dos piezas y el suceso E de que al menos una sea de acabado Mate (M)?",opciones:["S = {BB, BM, MB, MM}, E = {BM, MB, MM}","S = {BB, BM, MB, MM}, E = {MM}","S = {B, M}, E = {M}","S = {BB, MM}, E = {BM, MB}"],correcta:0,retroalimentacion:"Para dos piezas se obtienen 4 combinaciones. El suceso 'al menos una de acabado Mate' comprende las combinaciones {BM, MB, MM}."},{id:122,municipio:"San Francisco",tema:"Tintes Naturales para Tejidos",contexto:"Una tejedora de San Francisco extrae al azar dos madejas de hilo de diferentes tintes de su canasta que contiene madejas de color Nogal (N), Aliso (A) y Cúrcuma (C) (sin importar el orden y sin repetición).",pregunta:"¿Cuál es el espacio muestral S de las parejas de colores y el suceso E de que se extraiga el tinte de Cúrcuma (C)?",opciones:["S = {NA, NC, AC}, E = {NC, AC}","S = {N, A, C}, E = {C}","S = {NA, NC, AC}, E = {NA}","S = {NA, NC, AC}, E = {NA, NC, AC}"],correcta:0,retroalimentacion:"Al seleccionar 2 madejas de 3 diferentes sin orden ni repetición, se tienen 3 combinaciones. El suceso de que aparezca Cúrcuma (C) es E = {NC, AC}."},{id:123,municipio:"Puerto Guzmán",tema:"Variedades de Yuca",contexto:"Un agricultor en Puerto Guzmán cultiva yuca dulce y yuca amarga. Selecciona dos raíces al azar de su cosecha para examinarlas y registra si cada una es Dulce (D) o Amarga (A).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que ninguna de las raíces sea Amarga (A)?",opciones:["S = {DD, DA, AD, AA}, E = {DD}","S = {DD, DA, AD, AA}, E = {AA}","S = {D, A}, E = {D}","S = {DD, AA}, E = {DA, AD}"],correcta:0,retroalimentacion:"El espacio muestral de dos raíces es S = {DD, DA, AD, AA}. Que ninguna sea Amarga significa que ambas son Dulces, resultando en el suceso E = {DD}."},{id:124,municipio:"Puerto Caicedo",tema:"Saborizadores de Chocolate",contexto:"En una cooperativa de Puerto Caicedo se decide agregar una esencia natural a una línea de chocolate. Las esencias candidatas son Menta (M), Clavo (C) o Canela (N). Se elige una al azar.",pregunta:"¿Cuál es el espacio muestral S de la esencia y el suceso E de que no se elija Clavo (C)?",opciones:["S = {M, C, N}, E = {M, N}","S = {M, C, N}, E = {C}","S = {M, N}, E = {M, C, N}","S = {Menta, Canela}, E = {Menta}"],correcta:0,retroalimentacion:"El espacio muestral agrupa las tres esencias posibles S = {M, C, N}. Al excluir el Clavo (C), el suceso de interés queda definido por las dos esencias restantes: E = {M, N}."},{id:125,municipio:"Mocoa",tema:"Inspección de Semillas de Árboles",contexto:"En un vivero de Mocoa, un operario evalúa dos semillas de cedro para ver si germinan en 10 días: Sí (S) o No (N).",pregunta:"¿Cuál es el espacio muestral S y el suceso E de que exactamente una de las semillas germine?",opciones:["S = {SS, SN, NS, NN}, E = {SN, NS}","S = {SS, NN}, E = {SN}","S = {S, N}, E = {S}","S = {SS, SN, NS, NN}, E = {SS, NN}"],correcta:0,retroalimentacion:"Las cuatro combinaciones posibles de dos semillas independientes son S = {SS, SN, NS, NN}. El suceso de que exactamente una germine incluye las parejas con un 'S' y un 'N': E = {SN, NS}."}];function d4({onBackToPrac
